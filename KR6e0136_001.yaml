body:
  text: 可堂法師撰華嚴同教問答意義深玄文辭華贍固能合符乎佛祖之道可謂善述者矣笑庵法師遂摭所聞以辨差當猶不體其本而未免乎失焉善喜學雖寡陋輙為辨明非欲附名於梁棟間庶幾信可堂之道而釋學者之疑也覽者幸毋罪焉時戊子乾道四年冬至後一日善喜書玉峯沙門師會述蠡澤門人善喜注問云華嚴大宗唯同別二教別義講解多同但易簡特異而多不從易簡云初別教門廣引教證三一不同若作此釋者或有國土唯說一乘或有國土唯說三乘則俱非別教也若三一合說方受此名將釋法華同教則可云爾非今逈異餘宗別教一乘之謂也故云而多不從楊子曰不合乎先王之法者君子不法也若同教一義或曰三種易簡云一法界本末融會同二三一和合同三同頓同實同或曰四門會解云一三一和合同二泯二同三義類相似同四全收諸教同或曰立言小異大義不差玉峯曰孔目云會三歸一故知同也諸祖或曰全收泯二等者但立言雖異總不出此故云大義不差而學者二三不知孰是請諸少俊博採祖文示其所歸當公論是非不可私其所黨至祝至祝其一言通目隨別取一義孔目云眾多別義一言通目又會義不同多種法門隨別取一義餘無別相故華嚴中信解行等諸位以信一言成其信位位中所含即通成解行理事等一切法門亦簡前後諸位法相不同及會普眼境界一乘無礙陀羅尼門據斯聖巧一言之下玄復玄耳并同別中各說同別等義至相曰別教之中亦有同別由多即一是其同也為一中多即是別也同教之中亦有同別一乘三乘同一善巧是其同也各為據機別即是別也非諸方所諍不必辨也章初一別教二同教易簡釋曰後同教門直就法界本末融會故下章云此同教說諸乘等會融無二同一法界評曰此中引文不盡章曰此同教說諸乘等會融無二同一法界有其二門一泯權歸實門即一乘教也二攬實成權門則三乘教等也復錯亂宗因西域凡說一義皆具三支比量離三十三過今但引宗法而不出所因蓋由泯權歸實攬實成權為因故成同教無二之宗若陸沉所因安能會融無二又復將此所宗法而為同教得名因由豈非錯亂宗因乎自言此是能弘門非被機之教也易簡謂章初立此二門乃能弘門非被機之教若欲被機當如大疏中同別且吾祖立言判教而不為機況下文同別自有攝機成益之言耳迎福釋曰此乃三一合說則三乘一乘和合不異問所謂不異者還是三乘不異一乘耶一乘不異三乘耶況祖師自謂一以三即一故不異二以一即三故不異初屬別教即非同教今謂三一不異出何經論縱法華經亦破三顯一非三一不異也又注曰此約三一俱故名同會解曰一乘三乘和合不異又云三一共故又曰此約三一具故析薪云三一合明不審諸句為一為異若一何用互出若異何義為當又揀非海具百川等云云揀非海具百川義下當辨明至相釋曰經云會三歸一故知同也多義如彼至相曰所言同者三乘同一乘故又言同者小乘同一乘故又言同者小乘同三乘故等若言三乘同一乘則總收權小若言小乘同一乘則但收溝洫等前云大義不差今云多義如彼前後相仍也又曰今以理求通之與同義無別趣也孔目曰前德已述通別二教而未見釋相今以理求通之與同義無別趣也今從至相揚子曰適堯舜文王者為正道非堯舜文王者為他道君子正而不他也評曰易簡將彼別教釋此對同之別今取彼同示此對別之同義無舛也彼即孔目此即教章易簡曰孔目云別教者別於三乘則將孔目中別教釋今章中對同之別也玉峯云至相釋曰經云會三歸一故知同也則取孔目中同教示今章中對別之同也問前云別教但易簡特異今云對同之別義無舛也何自矛盾答前有過則斥之此可用則取之有何惑哉迎福亦曰別義皆同則亦與矣會解云別教名義諸祖皆同則亦許也已上第一義竟清涼總相會通中或分為四中云三同教一乘如法華等清凉總相會通中云或分為四此亦二門一中間三教存三泯二別故開之為四一別教小乘如四阿含等二同教三乘如深密等三同教一乘如法華等四別教一乘如華嚴經演義釋云一中間三教存三泯二者始終頓三名為中間以初有小乘後有圓教故名中間而始教存三故別為一教終頓二教泯二是同故合為一教下列四中云三同教一乘即合終頓二教也易簡釋教章攝益中同教一乘云此即三乘一乘和合屬同教攝前別教一乘即是圓教權教三乘即是始教同教一乘即當終頓故清涼玄文云三同教一乘如法華等演義釋云即合終頓二教也差當云善住舉此不辨非者意在正破會解然易簡引玄文證攝益中同教一乘且教章終頓屬三玄文終頓屬一引一證三故不足辨也評曰此師又指此乃別教所不揀者也易簡云中間三教雖皆為三人所得終頓二教會泯歸一同得佛果即是一乘始教三乘修因各異獲果亦殊此唯三乘局於權教今此對辨三乘乃獨始教權門也彼自難云華嚴一乘逈異諸教何故特揀權教三乘答今此文意蓋為學法相者不信大乘之外別有一乘權實混和故辨差別終頓二教亦是一乘非此所揀又曰終頓二教文雖不揀常自逈異易簡云終頓二教同得佛果即是一乘既謂一乘却云常自逈異且露地牛車乃四乘之一奚有異哉三世諸佛無不說此四乘法一者聲聞乘二者緣覺乘三者菩薩乘四者佛乘是謂四乘且西域東夏前後聖賢所有章疏除開人天亦只說此四乘法且如今家五教教雖有五乘唯四門廣如乘教開合中辨況至相賢首說圓教為一乘亦只當彼第四佛乘清凉圭峯說後三教為一乘亦只當彼第四佛乘豈有異哉故此指云即當終頓非圓教也決擇其意中亦曰終頓非後教也餘義不錄迎福會解曰要終頓二教同泯二故名同教一乘也注曰此約終頓二教泯二是同非即合終頓為同也正約終頓同無二乘故云同教一乘也又次義中注若終頓自相同者漸頓有異安得是同又曰不是合終頓為同但約同泯二故名同也又曰近人皆云終頓二教合為同教漸頓自殊將何合耶評曰此亦非圓中之同迎福謂從共教三乘中分出非圓中之同也又非合終頓是離之之存泯也合成四教離為五教既云非即合終頓即離之之存泯之之者語助也如莊子云殺之之怒決之之怒之類也又將泯二是同作同教得名所以迎福又自注云不將泯二為得名所以更用何耶又引合始終為漸教得名之因今返問之清凉曰始教存三故別為一教且始教存三還用何教合耶豈亦得名乎餘義可知如講時所辨清凉釋曰始教存三故別為一教終頓泯二是同故合為一教下列四中云三同教一乘即合終頓二教也演義第六前已具引評曰此乃泯二是同出合為一教之所以非同教得名之因由也是故存三為一教泯二為一教與小圓為四亦明曰同教一乘即合終頓與迎福有異迎福則曰因由泯二得名同教玉峯謂出合為一教之所以非同教得名之因由也然亦各自建立不必見疑又曰約圓融不融分成二種即實教頓教並皆不融為同教一乘貞元一之上下自具引此約理事無礙揀也問若一向不融何異頓實答曰若入圓收理事無礙必有事事無礙何以故由彰其無礙等四門皆別教故評曰既曰不融為同非泯二名同不亦顯然乎又此同教一乘是合終頓義亦明矣又曰若自他相絕則與眾生心同一體故無心外也不壞能所故能知也大疏第十三之上自解曰此通終頓二教但同一體是頓教兼不壞所知義即是終教若總取雙絕雙存亦圓教中同教義也演義四十一連次上文云六相圓融唯屬圓教一乘之別教義故同教之後唯一別教但離為終頓合為同教非別有能同同教也評曰既稱總取合二教也亦圓教中同非離之之終頓乃海具之江水安得不鹹正同此間之同教一乘也證今四教中同教也密祖釋能所證義曰能所無二大乘終教也能所俱泯大乘頓教中證道也行願鈔第二云二明能所無二者則法性宗證道謂大乘終教也三明能所俱泯者即大乘頓教中證道也觀祖曰以能所歷然證事法界能所一相證理法界及事理無礙相即之門能所俱泯證事理無礙形奪無寄門存亡無礙全證事理無障礙門舉一全收證事事無礙門貞元一之下評曰能所存亡無礙得非總取雙絕雙存圓中同教義乎演義四十四四地厭分中文是乃合前密祖之終頓也行願第二鈔前已引二三兩門即第四明存泯無礙亦總取終頓二教也舉一全收證事事無礙別教也此前更不立圓中同又於終頓之後別有此門義可見矣密祖釋理事無礙中至存泯同時則曰邐迤有此三重事理無礙之義方足智者一一審之行願第二鈔云七舉第六門收第五門明理事無礙不壞不泯即第六門明不壞不泯離相離性即第五門明離相不異離性此中亦明存泯無礙第六明存第五明泯此二門既其同時故無障礙也乃至邐迤有此三重事理無礙之義方備智者一一審之評曰即前觀祖能所一相所證事理無礙相即之門一重也能所俱泯證事理無礙形奪無寄門二重也存亡無礙全證事理無障礙門三重也如次前二祖取之第三重乃圓中之同如日月矣非合終頓乎但將前地經疏鈔并貞元疏及行願疏鈔對看皂白自分矣觀祖釋事理無礙曰會法性者以是同教一乘義理分齊故演義第七云二別釋十門即為十別一一門中多先正釋後會前義即前性相不同中十對之義又十對中唯會法性以是同教一乘義分齊故如前云三乘一乘別今但會一乘五性一性別今但會一性十對皆然評曰此蓋後三教並揀於權且法華仁王本業地論梁攝論等凡說一乘三乘皆是通語以聖教多含不可局執自古聖賢及吾宗諸祖互得引用若據地論梁論皆以初二三地寄在世間四地至七地寄出世間八地已上寄出出世間一乘法以彼一乘為後圓教三乘當中間三教小乘愚法教並將證成法華三一當知法華中三乘之人求三車出至門外者則三乘俱是出世自位究竟即是四地已去至七地者是也此依至相賢首也若欲料揀性相二宗權實亦得引證則昔日詮性之教皆屬一乘昔日詮相之教皆屬三乘是故祖曰但會昔權不會昔實此依清凉圭峯也今取後義總是一乘開之為同別此事理無礙是同教一乘之義理分齊故故一一會前終頓能揀權三之義也以同教一乘是該取頓實故也密祖又曰具此十門方名理事無礙又曰當同教大乘之極致後觀別教等祖曰但理事鎔融存亡逆順通有十門具此等十方名理事無礙已當大乘同教之極致故下第三觀是別教一乘逈異諸教評曰即前清涼存亡無礙全證之事理無礙門此大乘同教即前總取雙絕雙存圓教中同教也以祖曰大乘亦名一乘故理義正齊不必疑也後觀別教此觀同教何疑之有次前即言是同教一乘之義理分齊可為良證觀祖又曰實教大乘亦名一乘謂會三歸一唯有一乘法故即後三教合為一實即今性相二宗有多差別略列十條貞元一之上此能揀十義亦即此經中同教之義演義第六云然法性宗十義即此經同教中義密祖亦曰即華嚴同教義圓覺大鈔云法性中十義即華嚴中同教之義評曰此亦後三合為一實開二即同別貞元一之上云第四就實教中復有二門一約有位無位分之為二則以終教同前始教皆名為漸第四名頓二約圓融不融分成二種即實教頓教並皆不融為同教一乘唯第五圓融具德名別教一乘迎福曰賢首教門只有一乘中開二為同別或云圓教有二開成同別未甞有合後三為一實教開此為同別二教也且後三開同別者乃貞元疏也開三即圓終頓也是以為四即但有同別是合取頓實即圓中之同也以一乘三乘小乘三宗不同一乘有二故然此三宗寄於五教有乎二說一孔目教章等則以後一為一乘宗中間三教為三乘宗初一為小乘宗二依華嚴圓覺等疏初一為小乘宗次一為三乘宗後三為一乘宗今即後義此上釋合後三也合為一乘後段釋開後三也則唯後一中自有同別不取終頓以一乘唯有同別無餘乘故故成三一也此上等元是白書或五則終頓圓若後一自開同別則離之之終頓非合之之終頓亦以一乘三乘小乘三宗不同終頓各詮雙存俱泯偏而非圓若取終頓全同四中此理顯然宜深思之此則分四教即合終頓為圓中同教分五教則圓中自有同別若將四教作五教釋通開合不分偏圓難辨但見理事無礙之言便名終教如法華等理事無礙一宗所收大乘一發判為偏淺且理事無礙自有三重一能所無二二能所俱泯三存泯無礙豈可纔見理事無礙之言盡名終教致使深義例為偏淺何其謬哉若謂圭山之言而不通者圭山以漸頓一分則法華乃漸之終極故屬終教豈可執一言而妨多義也豈不礙他漸中之圓演義第五云華嚴之圓是頓中之圓法華之圓是漸中之圓漸頓之儀二經則異圓教化法二經不殊宗義要問上云法華經宗義是一乘經也別意教章云是故當知法華別意正在一乘在於一乘等語乎況吾宗未甞局判一經而作一教以深為淺吾祖誡之甚明可深體之可深思之已上第二義竟清凉曰一同教一乘同頓同實故大疏玄談云故此圓教語廣名無量乘語深唯顯一乘一乘有二一同教一乘同頓同實故二別教一乘唯圓融具德故易簡釋曰清凉玄文義理分齊中同頓同實及圓融具德乃教下曲分義門與以教攝乘義意亦別指總相會通同別并乘教開合同別乃曰皆明教門非是義相易簡釋乘教開合中文也評曰此兄常曰但是義相非為機教門以一圓教豈有二種修證故此揀云乃教下義門是義相也不同二處總相會通并乘教開合二處也皆明教門矣迎福釋曰三此中同教要圓教與終頓二教義類相似故云同也清凉自言同教者謂終頓二教也未甞云要圓教與終頓義類相似故云似涉無稽也評曰迎福老人聦明愽達當今諸方放出一頭地者也此論似涉無稽何耶清涼釋曰言同教者謂終頓二教雖說一性一相無二無三演義第七評曰此正同教自相也理應更曰言思斯絕以影在下文不言耳無二無三非泯二乎問曰同彼頓實安知合彼為同教耶答祖云下同同教釋此言也如次引云演義四十四鈔十門唯心中文也又曰不辨圓融具德事事無礙故非別教連次前文評曰揀非別教也既非別即同明矣不亦即終頓非別乎若約總𠬧諸教如圓教中有小乘戒善四諦因緣有始教中十地十如八識四智有終教中事理無礙有頓教中言思斯絕等如海有百川之水此則𠬧前四教也清凉曰圓必攝四圭山亦曰圓教攝於前四若約總揀諸教者如小乘唯人空自利始教五性三乘終教不說德用該𠬧頓教一向事理雙絕清涼曰如彼百川不同鹹味此則揀前四教也是知揀則揀前四教𠬧則𠬧前四教且祖師揀𠬧之義煥若臨鏡又何惑哉又曰而別教中有一性一相事理無礙言思斯絕同彼二教連次前文評曰此示能同即別教中彰其無礙也貞元云由彰其無礙皆別教也非別有同教同彼也今能所同義不同昔人可深體之昔謂自有能同同教同彼二教今謂能同乃別教中理事無礙同彼二教也良以同彼故取之也義如下引問信滿成佛行布十地同前諸教能同名同豈非同教同彼耶答彼約一乘同三乘方便引彼令捨權入實不待該而是圓此問答乃教章行位差別中文也章云以此經中安立諸位有二善巧一約相就門分位前後寄同三乘引彼方便是同教也二約體就法前後相入圓融自在異彼三乘是別教也若自別教即不依位成今即一乘寄同三乘引彼方便以本非江水故不待入本非不融故不待該也今約所詮事理無礙是一該取二教所詮入圓成此彰其無礙既該取二教入圓為圓中同教非離之之存泯也如浩然氣孟子云我之言我善養吾浩然之氣同雌雄風宋玉風賦云大王之風所謂雄風也庶人之風所謂雌風也總斯二風以為一氣浩然之外無別雌雄雌雄之外寧有浩然事理無礙同存絕即泯總斯存泯為事理無礙道理亦爾豈二事理無礙分能所耶章家約引權機此文該取偏法機教相須宛然凾蓋然皆別教一乘同前教耳雖有約機約法不同然皆圓別一乘同彼諸教也又通難曰以別該同皆圓教攝玄談義理分齊之文鈔曰猶彼江水入海亦鹹演義第七云謂有難言既同頓同實何異頓實故此通云即此同中必有別義如事理無礙必有事事無礙耳猶彼江水入海亦鹹評曰既俟別該即偏教之終頓非能同別教也又言江水入海非自海水即終頓為此之理事無礙明矣指圓教攝玄文云十善五戒亦圓教攝即總取雙絕雙存圓教中同教也當知該之之終頓非離之之終頓入海之江水非未入之水矣開為終頓則各得存絕即泯之一門該而合之則具得存絕即泯同時全入之事理無礙門也清涼曰若總取雙絕雙存亦圓教中同教義也即所謂同教一乘之義理分齊同教之極致也豈別有事理無礙同彼事理無礙乎若本與同之圓豈可復言圓教攝也若本海中之水何待入海方鹹是知未入海之江水須俟決流而趣然後同味也又曰圓教有二一同教二別教別即不共不共頓實同教者同頓同實若下同同教一乘等大疏十四之上列十門唯心云上之十門初一小教次三涉權次三就實後三約圓中不共若下同諸乘通十無礙演義四十四云上之十門下約教分別即具五教涉權是始教就實通二一即終教終教亦名實教故其攝相歸性亦通頓教以後三教皆同一乘並揀於權故頓亦名實後三圓融即是圓教而言不共者圓教有二一同教二別教別即不共不共頓實故二同教者同頓同實故今顯是別教故云不共若下同諸乘下約融通說若下同同教一乘即𠬧次三就實若同於三乘亦𠬧前四以其圓教如海包含無不具故評曰既言下同同教一乘則收次三門唯識則同教一乘是終頓何不得稱此名耶既曰收之是海具之江水不同長江也然海中江乃收長江同味耳別教同彼言下同也又曰若同三乘亦收前四自注云乃前四門唯識非四教也連次前文評曰別教一乘下同諸乘既不所同是三能同亦三當知別教下同終頓不應便非是圓却竢該而入圓也有謂能同是同教同彼終頓非別教下同終頓今以下同三乘例難云既不所同是三能同亦三明知能同終頓不應便非是別祖云海中百川滴滴皆具十德復何疑哉以本非江水故不待入本非不融故不待該蓋後三教並揀於權合為一實皆是一乘開即為二謂同別也貞元一之上有開之之終頓非圓中之同乃離之之存泯也今將合之入圓故說該耳該取終頓即圓中同也而鈔又曰如海包含無不具故演義四十四前已具引則總収諸教會三歸一得非廣乎有謂會三歸一但釋教章可也用釋餘義意勢全別則知其悞也總會諸權以入一實得非為人之教門乎有謂能弘門非被機之教者則知其妄也同頓同實又同三乘前後互出前明揀權未收溝洫且同頓實況復影在前文全收中耶前文者即玄談云語其橫𠬧全𠬧五教也此文揀收具明此即上所引大疏十四演義四十四之文也但揀頓實異於前文前云別教一乘唯圓融具德今云別即不共不共頓實而前文又曰尚非三四三四即終頓也前後相仍全同教章分相中也分相中全揀前四也又知不共非唯不共二乘乃權實三乘皆不共也權即始教實即終頓也揀則三一不同同則三一和合亦斯義也已上第三義竟全收諸教宗迎福曰四此中全揀前四不攝於圓約別教說若此中全收圓必攝四約同教義說故行願鈔作此指也此約圓教收前四教同成一教故云同也故下鈔亦云若同於三乘亦收前四以同教如海包含無不具故然上四義收攝同教體勢略盡有同此類以義收之則無所濫涉矣又餘三義諸祖共有同頓同實清涼新加唯約一乘深義說也又泯二是同乃目法華等餘三皆華嚴此錄會解第八評曰迎福老以海具百川說全收之義與章初少異迎福曰以初義共三一故少異全𠬧以全𠬧必約海具百川故說少異共三一不知將章初海印一乘并所詮中一乘為百川耶不百川非海而何會解揀全𠬧與章初異今問云章初一乘是海耶百川耶是豈敢將章初一乘為百川若不百川必應是海若謂之海復何異哉又曰共三一以法華為同教又不揀泯二是同之一乘目法華義又曰餘三皆華嚴華嚴非海乎或似自語前却會解初云共三一以目法華為同教不言泯二目法華下文却云泯二是同乃目法華餘三皆華嚴前後繁亂又曰然上四義收攝同教體勢略盡若曰旨意是一曰盡此四豈非是一若云祖文出處略盡莫未盡否且祖文自有三十餘處若以四義𠬧之莫未盡否又唯將全收作同教釋圭山云圓教攝四之時一一同圓清涼曰圓必攝四圓以貫之亦圓教攝賢首章初分相該攝明指為別教得志若合乎符節先聖後聖其揆一也迎福決謂全𠬧只作同教切不可要全𠬧諸教亦是別教自質云若爾全揀門復是何教耶此正要揀𠬧對說同別耳今却問云該𠬧全𠬧行相何異分相之與全揀復是何教且章初還可揀𠬧對說同別以否又曰收前四教同成一教故云同也此作得名所以不知自何而來也前云三一具故名同教又云同泯二故得名同教又云義類相似故名同教今謂𠬧前四教故云同教且同教一名隨文各出皆謂得名恐非祖意圭峯曰全收諸教宗同教緣起義亦指大疏玄談全收之義行願鈔第一云大疏玄談全揀全𠬧全揀諸宗即別教性起義全𠬧諸宗即同教緣起義評曰此作同教釋則是方便故賢首圓教或五也且取非即圓通義也孔目云若橫依方便進趣法門即有二義通說一乘一由依究竟一乘教成何以故從一乘流故又為一乘所目故二與彼究竟圓一乘為方便故故說一乘非即圓通自在義也既曰全收諸教即前之四教謂之諸教清涼曰圓必攝四若爾即教章所詮差別攝前之同教章曰若約同教即攝前諸教所說心識何以故是此方便故亦即教章之初同教以此同教始自一乘終至多乘無不包故亦即賢首總收十門唯心之同探玄第十三云一相見俱存至十帝網無礙上十門唯識道理於中初三門約初教說次四門約終教頓教說後三門約圓教中別教說總具十門約同教說清涼曰如海包含無不具故演義四十四卷則同頓同實之義亦是此義清涼曰下同同教一乘則𠬧次三門唯識下文亦說同三乘故若同於三乘亦𠬧前四章中前曰華嚴一乘後曰圓之同教若依圓教者有二義一攝前諸教所明行位等以是方便故云云非海而何斥會解揀非海具百川等至相亦曰會三歸一故知同也三即諸教故如初義已辯彥和可常共取至相此義釋章初二門但不用同與今有異義苑亦指此同章初之義義苑亦以會三歸一用釋章初同教此有深理昔可尚也安更有詞此義祖語稍多然又易見不多云也清涼全收曰大海必攝百川同一鹹味圓必攝四圓以貫之亦圓教攝綱要云其猶百川不攝大海大海一滴即攝百川雖攝百川同一鹹味雖包眾典圓以貫之故一文一句皆攝無盡尚非三四等有其所通無其所病玄談義理分齊中文圭山大鈔指全收為一是別教圓覺大鈔第五云圓教攝四之時一一同圓謂應難云既攝前四何殊小乘及法相等故今釋云尚非終頓何況初二如海中百川滿滿皆具十德及百川之味不同江河雖千萬里終無海中一德又曰統收不異曰一運載含融曰乘行願鈔第六章門探玄等亦爾圓教或一餘相盡故教章探玄皆乘教開合中文一切三乘等本來悉是一乘法故該攝中文則全收是別義亦可見孟子曰君子深造之以道欲其自得之也自得之則居之安居之安則資之深資之深則取之左右逢其源可堂老人左之右之常逢其源矣不能廣辨過吾門者熟聞之矣況孔目問答此之同別文義如雲然二師豫復二師既但此之三易簡三種四會解四義且亦逢場作戲耳已上第四義竟別出二章祖曰一乘教義分齊云何一乘教有二種一共教二不共教圓教一乘所明諸義文文句句皆具一切此是不共教二共教者則小乘三乘教名字雖同意皆別異要問上卷一乘分齊義評曰祖言別即不共十地疏十四之上別即不共不共實頓又曰逈異餘宗玄談云逈異餘教圓覺曰逈異諸宗又曰不共二乘玄談云不共二乘名一乘教又曰不共三乘小乘同孔目十明章又曰別於三乘孔目教章共有此皆敻絕逈異不共以解別也然其所自蓋出智論太一首用諸祖靡有不從其唯圓融具德乃目普法之自體非釋別名之訓義也又祖曰餘經是共教一乘三乘小乘共依故要問諸經部類差別義又曰二乘共有名數共同要問一乘分齊義又指成不成等四句則曰是一乘共教非別教也要問眾生作佛義皆以共釋同蓋共者同也又曰三一和合同一善巧故名同教教章云三乘一乘和合說故屬同教攝孔目云一乘三乘同一善巧是其同也此乃以合釋同同者合也則三乘為教一乘為義和合不離攝機成益也教章云若先以三乘引出後令得一乘亦是三一和合攝機成二益故屬同教又同者輩也齊也此言流輩相齊也祖曰同教門者則與三乘義同但由智回向故入一乘攝孔目真如章又曰依一乘教分與終教相同要問諸修道總別義又曰同教者同頓同實玄談義理分齊并十地鈔下同諸乘演義四十四又曰文雖是同意皆別異孔目十地章云文雖是同而義皆別皆言三一宗差法門同也又說法華漸同華嚴章曰或說釋迦報土在靈鷲山如法華云我常在靈山等法華論主釋為報身菩提山當知此約一乘同教說何以故以法華中亦顯一乘故其處隨教即染歸淨故說法華處即為實也如菩提樹下說華嚴處即為蓮華藏十佛境界法華亦爾漸同此故是同教也此以流輩相齊以釋同也此中法華即圓中同耳又曰今以理求通之與同義無別趣孔目妙趣章蓋以同猶通也故有通教一乘圓覺鈔云此是別教一乘非法華通教一乘也亦言是一法門通彼三一達乎二宗如曰上件法門攝下諸教頓屬其上分本教義漸從其末義通一乘三乘小乘何以故為彼圓教所目故孔目一乘三乘義章又曰此義在三乘亦通一乘說孔目緣起章又曰此文在三乘亦通一乘用要問三性三無性義又曰此文在一乘通彼三乘用要問悔過法義此以通釋同也然其濫觴皆智論之共教共即同故太一用之諸祖同遵豈有異致故知諸文同教之名釋訓不出三一共通和合流輩相齊故名同也釋訓既爾諸文互成今欲示義且作此耳其會三歸一乃教相也由彼教中詮顯此理知其是同可釋迴三入一教之名義也豈有將會三歸一作同字之訓義故會解說同教四義皆作得名訓義之因由譬彼空不空義乃二教之所詮非始終之訓義但二教所明空不空二義非二教之得名也故今一乘有共不共焉祖曰然此五教相攝融通有其五重一或總為一謂圓教攝於前四一一同圓唯一大善巧法教章云或總為一謂本末融鎔唯一大善巧法探玄并大疏貞元皆云唯是如來一大善巧攝生方便圓覺大鈔第五云圓教攝四之時一一同圓或名圓教或名一乘或名教綱或名教海或名一圓音教或名普法或名通宗孔目十玄章或名性起樹藏要問教相義云性起樹藏內莊一乘外嚴三乘及小乘等或名緣起大樹要問成佛前後義云若依一乘教於念念中成佛皆盡所化有情在諸位中十住已去乃至菩提皆盡眾生界成位遍滿無有前後為同一緣起大樹故也或名無盡圓通自在宗孔目法數章或名圓通自在法孔目料簡章或名無盡佛法或名普賢無盡法或名法界大宗或名圓滿教或名圓宗或名滿藏或名圓圓海釋論第十云大本華嚴契經中作如是說其圓圓海得諸佛勝故其一切佛不能成就圓圓海劣故或名性德圓滿海釋論第一云摩訶衍法諸佛所得耶能得於諸佛諸佛得不故菩薩二乘一切異生亦復如是性德圓滿海是焉或名教本或名總相法門大經疏三之上云第一天王得總相法門諸佛將興皆生彼天下生之時普應法界頓闡華嚴為圓滿法或名圓滿教輪華嚴經第二卷云復次知足天王得一切佛出興世圓滿教輪解脫門評曰皆華嚴圓別一乘全收諸教之大宗也包容融攝具德圓通隨稱皆得耳此全得總相會通之大意故引諸名為分教之本願諸來裔幸冀留情或開為二或曰本末章曰一本教謂別教一乘為諸教本故二末教謂小乘三乘從彼所流故或名究竟方便章曰究竟及方便以三乘小乘望一乘悉為方便故或曰三乘一乘孔目一乘三乘章或曰共不共教智論以華嚴經為不共教餘經是共教也或名同別或名正乘方便乘或約大小要問云謂大小二乘於方便中從教趣果分二故或約權實且權實有乎二說一約究竟方便以明權實於五教中後一為究竟乘前之四教為方便乘前四教自有權實何以俱為權耶答以實體不足故不說一切皆有佛知見故故屬三乘並為方便二貞觀以來法相繁異以五性三乘為實一乘一性為權其說翳乎一乘其道盛行中國於是起信等疏言教具闕中廣闢斯義遂明一乘一性為實三乘五性為權於五教中前二為三乘後三為一乘終頓皆明一性是以判入一乘清涼圭峰皆承襲之遂有二說焉或約曲直釋迦經謂屆曲教舍那經謂平道教或約漸頓等章曰謂以先習小乘後趣大乘大由小起故名為漸直徃菩薩大不由小故名為頓評曰皆前一乘圓教開也但或首開不共一乘次分大小權實首開不共於共教中分為大小就大乘中復分權實或先析小乘後分權實同別先開不共小乘次分權實前一為權後三為實就一實中復分同別前二為同教一乘後一為別教一乘或作一乘一乘有二一同教一乘二別教一乘或作三一故開二中有多變態耳然諸共教或名三乘或名一者由一乘共即彼三乘小乘但由智迴向故入一乘攝孔目真如章左右稱耳問諸方便乘名一乘者為即以否否者不定之詞諸方便乘名一乘者為即究竟一乘耶為非究竟一乘耶答有二義一由依究竟一乘教成何以故從一乘流故又為一乘教所目故無異事也二與彼究竟圓一乘為方便故故說一乘非即圓通自在義也孔目橫依方便進趣法門故約即不即以分二義差別故或開為三小乘三乘一乘或漸頓等光統立漸頓圓至相搜玄用此評曰初義就五教有二說若皆為去聲三人則中三為三如探玄教章孔目問答等若泯二屬一則後三皆一如華嚴圓覺疏等是故四中同教一乘或從三出就共教中約存三泯二不同分之為二或從一出合後三為實分之為二則有同別一乘是故貞元大開權實仍小為三十條揀權於後一實開同別也貞元第一之上或分為四謂別教小乘至別教一乘或小漸等探玄云或分為四此有二義一於上共教中約存三泯二開兩教故為四一別教小乘二同教三乘如深密等三同教一乘如法華等四別教一乘如華嚴等二約歷位無位開漸頓二教故為四一小乘教二漸教三頓教四圓教評曰原夫初義通論大旨唯有三宗別教小乘不通菩薩名小乘宗共教三乘三人同稟名三乘宗直顯本法并會三歸一名一乘宗但五教中六七清凉圭山二祖多取泯二屬一以揀於權後三皆實名一乘宗不融為同以融為別貞元第一之上前已引竟四五雲華賢首二祖每以中間通為去聲屬三乘宗後一究竟為一乘宗五祖復以存三泯二分其頓實歸一乘宗探玄第一故五六祖師分三之後皆就三宗兩其同別而成四教探玄并大疏皆於共教中約存三泯二開兩教故分為四一乘宗中自有二故是故或將第五為別前四總為共教一乘於中即有小乘三乘一乘或更析開不共小乘共教三乘其餘如來藏佛性泯二之教楞為共教一乘與今圓開四教名體全符蓋諸共教上下相望自有共不共也要問上一乘分齊義云仍諸共教上下相望有共不共如小乘教三世有等三乘則無三乘教有小乘則無或二乘共有如道品等名數共同或二乘俱無則一乘教是也若析頓實以為所揀總屬方便入三乘攝却散為五後一自具同別為一乘宗是則一乘還有同別亦順三宗故一乘中無二同教對一別也是則頓實屬三則權屬一則實離偏而合圓也蓋以教海之中接引物機有多方便句數不同前代諸德各述一門如古今立教中辨吾祖籠絡結成教網故有開合縱成多教皆初圓中漸次開也苟爾亦圓之始小耶答實爾總之別也又何離偏而合圓耶機有普別智有三一得向異故是故卷舒不曰一端舒而常卷卷又即舒舒卷自在為華嚴教網之大宗也
